services:
  authservice:
    build:
      context: ./services/AuthService
    ports:
      - "5000:80"

  expenseservice:
    build:
      context: ./services/ExpenseService
    ports:
      - "5001:80"

  apigateway:
    build:
      context: ./services/ApiGateway
    ports:
      - "5002:80"
    depends_on:
      - authservice
      - expenseservice